name: Setup App
description: Sets up Node.js, installs dependencies, and optionally builds the app.

inputs:
  install-command:
    description: Command used to install dependencies.
    required: false
    default: pnpm install --frozen-lockfile
  build:
    description: Whether to build the app after installing dependencies.
    required: false
    default: 'false'
  build-command:
    description: Command used when build is enabled.
    required: false
    default: pnpm run build

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

    - name: Setup node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: '.node-version'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.workspace }}
      run: ${INPUTS_INSTALL_COMMAND}
      env:
        INPUTS_INSTALL_COMMAND: ${{ inputs.install-command }}

    - name: Inject runtime config overrides
      if: ${{ env.CLIENT_CONFIG_OVERRIDES_JSON != '' }}
      shell: bash
      working-directory: ${{ github.workspace }}
      run: node scripts/inject-client-config.js
      env:
        CLIENT_CONFIG_OVERRIDES_JSON: ${{ env.CLIENT_CONFIG_OVERRIDES_JSON }}
        CLIENT_CONFIG_OVERRIDES_STRICT: ${{ env.CLIENT_CONFIG_OVERRIDES_STRICT }}

    - name: Display injected config
      if: ${{ env.CLIENT_CONFIG_OVERRIDES_JSON != '' }}
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        summary_file="${GITHUB_STEP_SUMMARY:-}"
        echo "::group::Injected Client Config"
        experiments_json="$(jq -c '.experiments // "No experiments configured"' config.json 2>/dev/null || echo 'config.json not readable')"
        echo "$experiments_json"
        echo "::endgroup::"

        if [[ -n "$summary_file" ]]; then
          {
            echo "### Injected client config"
            echo
            echo "\`\`\`json"
            echo "$experiments_json"
            echo "\`\`\`"
          } >> "$summary_file"
        fi

    - name: Build app
      if: ${{ inputs.build == 'true' }}
      shell: bash
      working-directory: ${{ github.workspace }}
      run: ${INPUTS_BUILD_COMMAND}
      env:
        INPUTS_BUILD_COMMAND: ${{ inputs.build-command }}
