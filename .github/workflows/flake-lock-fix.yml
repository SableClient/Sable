name: Fix flake hashes

on:
  push:
    branches: [integration]
    paths: ['pnpm-lock.yaml']

jobs:
  fix:
    name: Fix flake hashes
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout integration
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: integration
          persist-credentials: true

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1

      - id: check
        run: nix flake check -L
        continue-on-error: true

      - name: Fix hash mismatches
        if: steps.check.outcome == 'failure'
        run: determinate-nixd fix hashes --auto-apply

      - name: Commit and push if changed
        if: steps.check.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes after fix hashes; nothing to commit."
            exit 0
          fi
          git config user.name "sable-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --update --ignore-removal .
          git commit -m "chore(nix): auto-fix nix hashes"
          git push origin HEAD:integration
