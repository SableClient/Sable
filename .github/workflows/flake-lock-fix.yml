name: Fix flake hashes

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths: ['pnpm-lock.yaml']

jobs:
  fix:
    name: Fix flake hashes
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout dev
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: dev
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1

      - id: check
        run: nix flake check -L
        continue-on-error: true

      - name: Fix hash mismatches
        if: steps.check.outcome == 'failure'
        run: determinate-nixd fix hashes --auto-apply

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure bot git identity
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          gh auth setup-git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit and push if changed
        if: steps.check.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes after fix hashes; nothing to commit."
            exit 0
          fi
          git add --update --ignore-removal .
          git commit -m "chore(nix): auto-fix nix hashes"
          git push origin HEAD:dev --force-with-lease
