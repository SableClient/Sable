    <style>
      :root[data-sable-boot-theme='light'] {
        --sable-bg-container: #ffffff;
        --sable-bg-container-active: #e4e4e7;
        --sable-bg-on-container: #18181b;
        color-scheme: light;
        background: #ffffff;
      }

      :root[data-sable-boot-theme='dark'] {
        --sable-bg-container: #1b1a21;
        --sable-bg-container-active: #2d2c36;
        --sable-bg-on-container: #eae8f0;
        color-scheme: dark;
        background: #1b1a21;
      }

      body {
        background: var(--sable-bg-container);
        color: var(--sable-bg-on-container);
      }
    </style>
    <script>
      (function () {
        var APPLIED_THEME_STORAGE_KEY = 'sable_applied_remote_theme_css';
        var APPLIED_TWEAKS_STORAGE_KEY = 'sable_applied_remote_tweaks_css';
        var REMOTE_STYLE_ID = 'sable-remote-theme-style';
        var REMOTE_TWEAKS_STYLE_ID = 'sable-remote-tweaks-style';

        function isNonEmptyString(value) {
          return typeof value === 'string' && value.trim().length > 0;
        }

        function normalizeUrl(value) {
          return isNonEmptyString(value) ? value.trim() : '';
        }

        function normalizeUrls(values) {
          if (!Array.isArray(values)) return [];
          return values
            .map(function (value) {
              return normalizeUrl(value);
            })
            .filter(Boolean);
        }

        function readJson(key) {
          try {
            var raw = window.localStorage.getItem(key);
            return raw ? JSON.parse(raw) : undefined;
          } catch (_err) {
            return undefined;
          }
        }

        function upsertStyle(id, cssText) {
          if (!isNonEmptyString(cssText)) return;
          var node = document.getElementById(id);
          if (!node) {
            node = document.createElement('style');
            node.id = id;
            document.head.appendChild(node);
          }
          if (node.textContent !== cssText) {
            node.textContent = cssText;
          }
        }

        function slotIsDark(settings, systemIsDark) {
          if (systemIsDark) {
            if (isNonEmptyString(settings.themeRemoteDarkFullUrl)) {
              return settings.themeRemoteDarkKind ? settings.themeRemoteDarkKind === 'dark' : true;
            }
            return settings.darkThemeId ? settings.darkThemeId === 'dark-theme' : true;
          }

          if (isNonEmptyString(settings.themeRemoteLightFullUrl)) {
            return settings.themeRemoteLightKind ? settings.themeRemoteLightKind === 'dark' : false;
          }
          return settings.lightThemeId === 'dark-theme';
        }

        function readSettings() {
          var settings = {};
          try {
            settings = JSON.parse(window.localStorage.getItem('settings') || '{}') || {};
          } catch (_err) {
            settings = {};
          }
          return settings;
        }

        function resolveBootTheme(settings, systemIsDark) {
          if (settings.useSystemTheme === false) {
            if (isNonEmptyString(settings.themeRemoteManualFullUrl)) {
              if (settings.themeRemoteManualKind) {
                return settings.themeRemoteManualKind === 'dark' ? 'dark' : 'light';
              }
            }
            return settings.themeId === 'dark-theme' ? 'dark' : 'light';
          }

          return slotIsDark(settings, systemIsDark) ? 'dark' : 'light';
        }

        function resolveActiveRemoteThemeUrl(settings, systemIsDark) {
          if (settings.useSystemTheme === false) {
            return normalizeUrl(settings.themeRemoteManualFullUrl);
          }
          return systemIsDark
            ? normalizeUrl(settings.themeRemoteDarkFullUrl)
            : normalizeUrl(settings.themeRemoteLightFullUrl);
        }

        function resolveActiveRemoteTweakUrls(settings) {
          return normalizeUrls(settings.themeRemoteEnabledTweakFullUrls);
        }

        function applyCachedThemeCss(settings, systemIsDark) {
          var activeThemeUrl = resolveActiveRemoteThemeUrl(settings, systemIsDark);
          if (activeThemeUrl) {
            var themeSnapshot = readJson(APPLIED_THEME_STORAGE_KEY);
            if (
              themeSnapshot &&
              normalizeUrl(themeSnapshot.url) === activeThemeUrl &&
              isNonEmptyString(themeSnapshot.cssText)
            ) {
              upsertStyle(REMOTE_STYLE_ID, themeSnapshot.cssText);
            }
          }

          var activeTweakUrls = resolveActiveRemoteTweakUrls(settings);
          if (activeTweakUrls.length > 0) {
            var tweakSnapshot = readJson(APPLIED_TWEAKS_STORAGE_KEY);
            var snapshotUrls = normalizeUrls(tweakSnapshot && tweakSnapshot.urls);
            if (
              snapshotUrls.length === activeTweakUrls.length &&
              snapshotUrls.every(function (url, index) {
                return url === activeTweakUrls[index];
              }) &&
              isNonEmptyString(tweakSnapshot && tweakSnapshot.cssText)
            ) {
              upsertStyle(REMOTE_TWEAKS_STYLE_ID, tweakSnapshot.cssText);
            }
          }
        }

        var systemIsDark =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var settings = readSettings();
        var theme = resolveBootTheme(settings, systemIsDark);
        var color = theme === 'dark' ? '#1b1a21' : '#ffffff';
        document.documentElement.dataset.sableBootTheme = theme;
        document.documentElement.style.backgroundColor = color;

        document.querySelectorAll('meta[name="theme-color"]').forEach(function (meta) {
          meta.setAttribute('content', color);
        });

        applyCachedThemeCss(settings, systemIsDark);
      })();
    </script>
