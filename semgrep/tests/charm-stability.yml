rules:
  - id: charm-runtime-reload-needs-telemetry
    message: >-
      Route runtime-triggered reloads through `reloadWithTelemetry()` so Sentry captures the reason
      before the page unloads.
    languages:
      - typescript
      - javascript
    severity: ERROR
    pattern: window.location.reload()

  - id: charm-no-unsafe-dangerously-set-inner-html
    message: >-
      Keep `dangerouslySetInnerHTML` confined to the approved sanitization/rendering helpers.
      New uses must go through an explicitly reviewed HTML sanitization path first.
    languages:
      - typescript
      - javascript
    severity: ERROR
    pattern-regex: dangerouslySetInnerHTML

  - id: charm-window-open-needs-noopener
    message: >-
      Opening a new tab without explicit `noopener,noreferrer` leaves the new page with access to
      the opener window. Pass the feature string when using `window.open(..., '_blank')`.
    languages:
      - typescript
      - javascript
    severity: ERROR
    pattern: window.open($URL, '_blank')

  - id: charm-no-sensitive-console-logging
    message: >-
      Do not send access tokens, passwords, secrets, or raw session tokens to the console. Route
      operational details through the structured debug logger with scrubbed fields instead.
    languages:
      - typescript
      - javascript
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: console.$METHOD($SECRET)
          - pattern: console.$METHOD(..., $SECRET, ...)
      - metavariable-regex:
          metavariable: $SECRET
          regex: '(?i)[A-Za-z0-9_$.]*(accessToken|refreshToken|sessionToken|apiKey|password|secret|token)[A-Za-z0-9_$.]*'
